name: Bug report
description:
  Report a reproducible problem with the nyc-geo-toolkit package, docs, or
  examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for someone else to reproduce the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Loading a packaged layer raises...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description:
        Share the exact steps, command, or code path that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description:
        Include Python version, install extra set, OS, and any other relevant
        context.
      placeholder: Python 3.12, `nyc-geo-toolkit[all]`, macOS 15...
    validations:
      required: true
